<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - Green Haven Nursery</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-stone-50">
    
    <!-- Navigation Bar -->
    <nav class="bg-white border-b border-stone-200">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <svg class="w-8 h-8 text-emerald-700" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                    <span class="text-2xl font-serif text-emerald-900 tracking-tight">Green Haven</span>
                </div>
                
                <a href="../index.html" class="text-sm text-stone-600 hover:text-emerald-700 transition">
                    Back to Home
                </a>
            </div>
        </div>
    </nav>
    
    <!-- Auth Container -->
    <section class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full">
            <!-- Tabs -->
            <div class="flex border-b border-stone-200 mb-8">
                <button id="login-tab" class="flex-1 py-4 px-6 text-center border-b-2 border-emerald-700 text-emerald-700 font-medium transition">
                    Login
                </button>
                <button id="register-tab" class="flex-1 py-4 px-6 text-center border-b-2 border-transparent text-stone-600 hover:text-emerald-600 font-medium transition">
                    Register
                </button>
            </div>
            
            <!-- Login Form -->
            <div id="login-form-container" class="bg-white rounded-2xl shadow-xl p-8">
                <h2 class="text-3xl font-serif text-emerald-950 mb-6">Welcome Back</h2>
                
                <form onsubmit="handleLogin(event)" class="space-y-6">
                    <div>
                        <label for="login-email" class="block text-sm font-medium text-stone-700 mb-2">Email Address</label>
                        <input 
                            type="email" 
                            id="login-email" 
                            name="email" 
                            required 
                            class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                            placeholder="you@example.com"
                        >
                    </div>
                    
                    <div>
                        <label for="login-password" class="block text-sm font-medium text-stone-700 mb-2">Password</label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="login-password" 
                                name="password" 
                                required 
                                class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                                placeholder="••••••••"
                            >
                            <button 
                                type="button" 
                                onclick="togglePasswordVisibility('login-password', 'login-password-icon')"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600"
                            >
                                <svg id="login-password-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <button 
                        type="submit" 
                        class="w-full bg-emerald-700 text-white py-3 rounded-full font-medium hover:bg-emerald-800 transition shadow-lg hover:shadow-xl"
                    >
                        Login
                    </button>
                </form>
            </div>
            
            <!-- Register Form -->
            <div id="register-form-container" class="bg-white rounded-2xl shadow-xl p-8 hidden">
                <h2 class="text-3xl font-serif text-emerald-950 mb-6">Create Account</h2>
                
                <form onsubmit="handleRegister(event)" class="space-y-6">
                    <div>
                        <label for="register-name" class="block text-sm font-medium text-stone-700 mb-2">Full Name</label>
                        <input 
                            type="text" 
                            id="register-name" 
                            name="name" 
                            required 
                            class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                            placeholder="John Doe"
                        >
                    </div>
                    
                    <div>
                        <label for="register-email" class="block text-sm font-medium text-stone-700 mb-2">Email Address</label>
                        <input 
                            type="email" 
                            id="register-email" 
                            name="email" 
                            required 
                            class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                            placeholder="you@example.com"
                        >
                    </div>
                    
                    <div>
                        <label for="register-phone" class="block text-sm font-medium text-stone-700 mb-2">Phone Number</label>
                        <input 
                            type="tel" 
                            id="register-phone" 
                            name="phone" 
                            required 
                            class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                            placeholder="(555) 123-4567"
                        >
                    </div>
                    
                    <div>
                        <label for="register-address" class="block text-sm font-medium text-stone-700 mb-2">Delivery Address</label>
                        <textarea 
                            id="register-address" 
                            name="address" 
                            required 
                            rows="2"
                            class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                            placeholder="123 Garden St, Green Valley, CA 12345"
                        ></textarea>
                    </div>
                    
                    <div>
                        <label for="register-password" class="block text-sm font-medium text-stone-700 mb-2">Password</label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="register-password" 
                                name="password" 
                                required 
                                minlength="6"
                                class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                                placeholder="At least 6 characters"
                            >
                            <button 
                                type="button" 
                                onclick="togglePasswordVisibility('register-password', 'register-password-icon')"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600"
                            >
                                <svg id="register-password-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <div>
                        <label for="register-confirm-password" class="block text-sm font-medium text-stone-700 mb-2">Confirm Password</label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="register-confirm-password" 
                                name="confirm_password" 
                                required 
                                minlength="6"
                                class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                                placeholder="Re-enter password"
                            >
                            <button 
                                type="button" 
                                onclick="togglePasswordVisibility('register-confirm-password', 'register-confirm-password-icon')"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600"
                            >
                                <svg id="register-confirm-password-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <button 
                        type="submit" 
                        class="w-full bg-emerald-700 text-white py-3 rounded-full font-medium hover:bg-emerald-800 transition shadow-lg hover:shadow-xl"
                    >
                        Create Account
                    </button>
                </form>
            </div>
        </div>
    </section>
    
    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
