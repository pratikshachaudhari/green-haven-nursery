<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Green Haven Nursery</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-stone-50">
    
    <!-- Navigation Bar -->
    <nav class="bg-white border-b border-stone-200">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <svg class="w-8 h-8 text-emerald-700" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                    <span class="text-2xl font-serif text-emerald-900 tracking-tight">Green Haven</span>
                </div>
                
                <span class="text-sm text-stone-600">Secure Checkout</span>
            </div>
        </div>
    </nav>
    
    <!-- Checkout Content -->
    <section class="py-16">
        <div class="max-w-6xl mx-auto px-6">
            <h1 class="text-4xl font-serif text-emerald-950 mb-8">Complete Your Order</h1>
            
            <div class="grid lg:grid-cols-3 gap-8">
                <!-- Checkout Form -->
                <div class="lg:col-span-2 space-y-6">
                    <!-- Delivery Information -->
                    <div class="bg-white rounded-2xl p-8 shadow-lg">
                        <h2 class="text-2xl font-serif text-emerald-900 mb-6">Delivery Information</h2>
                        
                        <form id="checkout-form" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-stone-700 mb-2">Full Name</label>
                                <input 
                                    type="text" 
                                    id="name" 
                                    required 
                                    class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-emerald-500"
                                >
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-stone-700 mb-2">Phone Number</label>
                                <input 
                                    type="tel" 
                                    id="phone" 
                                    required 
                                    class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-emerald-500"
                                >
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-stone-700 mb-2">Delivery Address</label>
                                <textarea 
                                    id="address" 
                                    required 
                                    rows="3"
                                    class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-emerald-500"
                                ></textarea>
                            </div>
                        </form>
                    </div>
                    
                    <!-- Payment Method -->
                    <div class="bg-white rounded-2xl p-8 shadow-lg">
                        <h2 class="text-2xl font-serif text-emerald-900 mb-6">Payment Method</h2>
                        
                        <div class="space-y-3">
                            <label class="flex items-center p-4 border-2 border-emerald-700 rounded-lg cursor-pointer bg-emerald-50">
                                <input type="radio" name="payment" value="COD" checked class="w-5 h-5 text-emerald-700">
                                <div class="ml-4 flex-1">
                                    <div class="flex items-center justify-between">
                                        <span class="font-medium text-emerald-900">Cash on Delivery</span>
                                        <svg class="w-8 h-8 text-emerald-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                                        </svg>
                                    </div>
                                    <p class="text-sm text-stone-600 mt-1">Pay when you receive your plants</p>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
                
                <!-- Order Summary -->
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-2xl p-6 shadow-lg sticky top-24">
                        <h2 class="text-2xl font-serif text-emerald-900 mb-6">Order Summary</h2>
                        
                        <div id="order-items" class="space-y-3 mb-6">
                            <!-- Items will be loaded here -->
                        </div>
                        
                        <div class="border-t border-stone-200 pt-4 space-y-3 mb-6">
                            <div class="flex justify-between text-stone-600">
                                <span>Subtotal</span>
                                <span id="summary-subtotal">$0.00</span>
                            </div>
                            <div class="flex justify-between text-stone-600">
                                <span>Shipping</span>
                                <span class="text-emerald-700 font-medium">FREE</span>
                            </div>
                            <div class="border-t border-stone-200 pt-3 flex justify-between text-lg font-serif">
                                <span>Total</span>
                                <span class="text-emerald-700" id="summary-total">$0.00</span>
                            </div>
                        </div>
                        
                        <button 
                            onclick="placeOrder()" 
                            id="place-order-btn"
                            class="w-full bg-emerald-700 text-white py-3 rounded-full font-medium hover:bg-emerald-800 transition shadow-lg hover:shadow-xl"
                        >
                            Place Order
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <!-- Success Modal -->
    <div id="success-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full text-center animate-fade-in">
            <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-emerald-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            
            <h3 class="text-3xl font-serif text-emerald-950 mb-4">Order Placed Successfully!</h3>
            <p class="text-stone-600 mb-6">
                Your order has been confirmed. You'll receive an email with your delivery code shortly.
            </p>
            
            <div class="bg-emerald-50 rounded-xl p-4 mb-6">
                <p class="text-sm text-stone-600 mb-1">Your Delivery Code</p>
                <p class="text-2xl font-mono font-bold text-emerald-700" id="delivery-code"></p>
            </div>
            
            <a href="../index.html" class="inline-block bg-emerald-700 text-white px-8 py-3 rounded-full hover:bg-emerald-800 transition">
                Back to Home
            </a>
        </div>
    </div>
    
    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        let cartData = null;
        
        // Load data on page load
        document.addEventListener('DOMContentLoaded', async function() {
            if (!requireAuth()) return;
            
            await loadUserData();
            await loadCartSummary();
        });
        
        // Load user data for pre-filling form
        async function loadUserData() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            document.getElementById('name').value = user.name || '';
            document.getElementById('phone').value = user.phone || '';
            document.getElementById('address').value = user.address || '';
        }
        
        // Load cart summary
        async function loadCartSummary() {
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_BASE_URL}/cart`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) throw new Error('Failed to load cart');
                
                cartData = await response.json();
                
                if (!cartData.items || cartData.items.length === 0) {
                    window.location.href = 'cart.html';
                    return;
                }
                
                displayOrderSummary(cartData);
                
            } catch (error) {
                console.error('Error loading cart:', error);
                showToast('Failed to load cart data', 'error');
            }
        }
        
        // Display order summary
        function displayOrderSummary(cart) {
            const container = document.getElementById('order-items');
            
            container.innerHTML = cart.items.map(item => `
                <div class="flex justify-between text-sm">
                    <span class="text-stone-700">${item.product.name} × ${item.quantity}</span>
                    <span class="text-stone-900 font-medium">${formatPrice(item.subtotal)}</span>
                </div>
            `).join('');
            
            document.getElementById('summary-subtotal').textContent = formatPrice(cart.total);
            document.getElementById('summary-total').textContent = formatPrice(cart.total);
        }
        
        // Place order
        async function placeOrder() {
            const form = document.getElementById('checkout-form');
            
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            
            if (!name || !phone || !address) {
                showToast('Please fill in all delivery information', 'error');
                return;
            }
            
            const btn = document.getElementById('place-order-btn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Processing...';
            
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_BASE_URL}/checkout`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        delivery_address: address,
                        payment_method: 'COD'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Show success modal
                    document.getElementById('delivery-code').textContent = data.order.delivery_code;
                    document.getElementById('success-modal').classList.remove('hidden');
                    
                    // Update cart count
                    updateCartCount();
                } else {
                    showToast(data.message || 'Order placement failed', 'error');
                    btn.disabled = false;
                    btn.textContent = originalText;
                }
                
            } catch (error) {
                console.error('Error placing order:', error);
                showToast('An error occurred. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }
    </script>
</body>
</html>
